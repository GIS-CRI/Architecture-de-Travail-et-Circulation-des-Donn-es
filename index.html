<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Architecture de Circulation des Données — CRI Marrakech-Safi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0D1B2A; font-family: 'Trebuchet MS', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState } = React;

const P = {
  bg:     "#0D1B2A",
  panel:  "#112233",
  border: "#1E3A5F",
  blue:   "#2E75B6",
  lblue:  "#5BA3D9",
  green:  "#4CAF50",
  gold:   "#BF8F00",
  lgold:  "#E6B800",
  purple: "#7B5EA7",
  red:    "#C0392B",
  white:  "#F0F4F8",
  muted:  "#7A9BBF",
  accent: "#00C9FF",
};

const LAYERS = [
  {
    id: "sources",
    label: "SOURCES DE DONNÉES",
    sublabel: "Entrées du système",
    color: P.purple,
    nodes: [
      {
        id: "sig_raw", label: "SIG & Terrain", icon: "🗺",
        color: P.blue, desc: "Données de terrain",
        details: ["Géoréférencement des zones économiques", "Disponibilité foncière par îlot/tranche", "Orthophotos et plans cadastraux", "Coordonnées Lambert Maroc — 355+ lots SBO"],
      },
      {
        id: "crui", label: "CRUI", icon: "📋",
        color: P.blue, desc: "Commission d'investissement",
        details: ["Dossiers validés par secteur (89 validés / 40 refusés)", "Montants investis — 3 688 MDH cumulés", "Emplois projetés — 6 437 emplois", "Motifs de refus détaillés par catégorie"],
      },
      {
        id: "conseillers", label: "Conseillers CRI", icon: "👥",
        color: P.blue, desc: "Demandes terrain",
        details: ["Demandes foncières non satisfaites (type, surface, localisation)", "Secteurs les plus demandés sans offre disponible", "Retours qualitatifs des porteurs de projets", "Signaux informels de prospection"],
      },
      {
        id: "partenaires", label: "Partenaires", icon: "🤝",
        color: "#5B8C5A", desc: "Région / AMDIE / ZAE",
        details: ["Signaux de prospection internationale par filière", "Projets en attente de foncier ou cadre réglementaire", "Tendances d'investissement inter-régionales", "Données Al Omrane, CGEM, Chambres consulaires"],
      },
      {
        id: "reglementaire", label: "Documents Urbanistiques", icon: "📐",
        color: P.gold, desc: "PA / Règlement / Charte",
        details: ["Plans d'Aménagement — zonage et affectations", "Règlements de zones (CUS, COS, gabarits, étages)", "Charte de l'Investissement — incitations applicables", "Permis de construire et conformité technique"],
      },
      {
        id: "investisseurs", label: "Investisseurs", icon: "💼",
        color: P.red, desc: "Retours & demandes",
        details: ["Satisfaction sur la qualité de l'offre proposée", "Freins rencontrés lors du processus d'installation", "Besoins d'extension ou de nouveaux lots", "Manifestations d'intérêt — données profil projet"],
      },
    ],
  },
  {
    id: "traitement",
    label: "COUCHE DE TRAITEMENT",
    sublabel: "Outils du service",
    color: P.blue,
    nodes: [
      {
        id: "sig_tool", label: "Base SIG", icon: "◈",
        color: P.blue, desc: "Référentiel géographique",
        details: ["17 plateformes économiques — 280+ km² couverts", "Cartographies thématiques CRUI (montants, emplois)", "Suivi mensuel disponibilité foncière par zone", "Croisement cadastre / PA / foncier collectif"],
      },
      {
        id: "odi", label: "ODI", icon: "⬡",
        color: P.blue, desc: "Observatoire de la Demande",
        details: ["Matching demande réelle vs offre disponible", "Alertes sur besoins non couverts par filière", "Dashboard trimestriel besoins non satisfaits", "Boucle de feedback — mise à jour continue du packaging"],
      },
      {
        id: "packaging", label: "Packaging de l'Offre", icon: "▣",
        color: P.blue, desc: "Fiche / Guide / Profil",
        details: ["Fiche-Projet (N1) — 15+ / an par zone active", "Guide Sectoriel (N2) — par filière stratégique + CM2030", "Profil Territorial (N3) — décliné par marché cible", "Mise à jour déclenchée par signaux ODI"],
      },
    ],
  },
  {
    id: "sorties",
    label: "SORTIES & USAGES",
    sublabel: "Utilisateurs du système",
    color: P.green,
    nodes: [
      {
        id: "direction", label: "Direction CRI", icon: "🏛",
        color: P.green, desc: "Pilotage & gouvernance",
        details: ["Rapport annuel d'attractivité régionale", "Tableau de bord de performance du service", "Notes de recommandations réglementaires", "Contribution aux arbitrages sur les PA en révision"],
      },
      {
        id: "conseil_inv", label: "Conseil Investisseurs", icon: "🎯",
        color: P.green, desc: "Accompagnement projets",
        details: ["Fiches-projets disponibles sous 48h pour CRUI", "Référentiel de compatibilité sectorielle/zone", "Leads fonciers qualifiés — 20+ / an", "Base de données actualisée pour entretiens"],
      },
      {
        id: "promotion", label: "Promotion Territoriale", icon: "📣",
        color: P.green, desc: "Marketing & roadshows",
        details: ["Guides Sectoriels CM2030 pour salons AMDIE", "Profil Territorial décliné FR / EN / AR", "Kit investisseur par filière cible", "Données cartographiques pour supports visuels"],
      },
      {
        id: "poti", label: "POTI", icon: "⬢",
        color: P.gold, desc: "Portail public H3",
        details: ["Q&A identification besoin investisseur", "Matching automatique foncier & zoning (2 couches)", "Affichage incitations Charte d'Investissement", "Lien vers Manifestation d'Intérêt"],
      },
    ],
  },
];

const FLOWS = [
  { from: "sig_raw",       to: "sig_tool",    label: "Données géo brutes",         color: P.blue },
  { from: "crui",          to: "odi",         label: "Dossiers + motifs refus",     color: P.blue },
  { from: "conseillers",   to: "odi",         label: "Demandes terrain",            color: P.blue },
  { from: "partenaires",   to: "odi",         label: "Signaux prospection",         color: "#5B8C5A" },
  { from: "reglementaire", to: "sig_tool",    label: "PA + règlement zones",        color: P.gold },
  { from: "reglementaire", to: "packaging",   label: "Incitations + CUS/COS",       color: P.gold },
  { from: "investisseurs", to: "odi",         label: "Retours post-installation",   color: P.red },
  { from: "sig_tool",      to: "odi",         label: "Disponibilités actualisées",  color: P.lblue },
  { from: "sig_tool",      to: "packaging",   label: "Cartes + données foncières",  color: P.lblue },
  { from: "odi",           to: "packaging",   label: "Alertes + mise à jour",       color: P.lblue },
  { from: "sig_tool",      to: "direction",   label: "Cartographies décision",      color: P.green },
  { from: "odi",           to: "direction",   label: "Dashboard besoins",           color: P.green },
  { from: "packaging",     to: "conseil_inv", label: "Fiches-projets / références", color: P.green },
  { from: "packaging",     to: "promotion",   label: "Guides Sectoriels / Profil",  color: P.green },
  { from: "sig_tool",      to: "poti",        label: "Couche foncière (H3)",        color: P.gold },
  { from: "packaging",     to: "poti",        label: "Guides + incitations (H3)",   color: P.gold },
  { from: "odi",           to: "poti",        label: "Matching temps réel (H3)",    color: P.gold },
  { from: "poti",          to: "odi",         label: "Manifestations d'intérêt",    color: "#E6B800" },
];

function NodeCard({ node, selected, onClick }) {
  const isSelected = selected === node.id;
  return (
    <div onClick={() => onClick(node.id)} style={{
      background: isSelected ? node.color + "22" : P.panel,
      border: `1.5px solid ${isSelected ? node.color : P.border}`,
      borderRadius: "8px", padding: "10px 12px", cursor: "pointer",
      transition: "all 0.2s",
      boxShadow: isSelected ? `0 0 16px ${node.color}44` : "none",
      minWidth: "110px", flex: 1,
    }}>
      <div style={{ fontSize: "18px", marginBottom: "4px", textAlign: "center" }}>{node.icon}</div>
      <div style={{
        color: isSelected ? node.color : P.white,
        fontSize: "11px", fontWeight: "bold",
        fontFamily: "'Trebuchet MS', sans-serif",
        textAlign: "center", lineHeight: 1.3,
      }}>{node.label}</div>
      <div style={{
        color: P.muted, fontSize: "9px",
        fontFamily: "'Trebuchet MS', sans-serif",
        textAlign: "center", marginTop: "3px", fontStyle: "italic",
      }}>{node.desc}</div>
    </div>
  );
}

function DetailPanel({ nodeId, onClose }) {
  const allNodes = LAYERS.flatMap(l => l.nodes);
  const node = allNodes.find(n => n.id === nodeId);
  if (!node) return null;
  const allNodesMap = Object.fromEntries(allNodes.map(n => [n.id, n]));
  const outFlows = FLOWS.filter(f => f.from === nodeId);
  const inFlows  = FLOWS.filter(f => f.to   === nodeId);

  return (
    <div style={{
      background: P.panel, border: `2px solid ${node.color}`,
      borderRadius: "10px", padding: "16px 20px", marginTop: "16px",
      boxShadow: `0 4px 24px ${node.color}33`, position: "relative",
    }}>
      <button onClick={onClose} style={{
        position: "absolute", top: "10px", right: "14px",
        background: "none", border: "none", color: P.muted,
        fontSize: "18px", cursor: "pointer", lineHeight: 1,
      }}>×</button>

      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "12px" }}>
        <span style={{ fontSize: "24px" }}>{node.icon}</span>
        <div>
          <div style={{ color: node.color, fontSize: "14px", fontWeight: "bold", fontFamily: "'Trebuchet MS', sans-serif" }}>{node.label}</div>
          <div style={{ color: P.muted, fontSize: "11px", fontFamily: "'Trebuchet MS', sans-serif", fontStyle: "italic" }}>{node.desc}</div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px" }}>
        <div>
          <div style={{ color: node.color, fontSize: "10px", fontWeight: "bold", letterSpacing: "1.5px", textTransform: "uppercase", fontFamily: "'Trebuchet MS', sans-serif", marginBottom: "6px" }}>Données / Contenu</div>
          {node.details.map((d, i) => (
            <div key={i} style={{ color: P.white, fontSize: "11px", fontFamily: "'Trebuchet MS', sans-serif", padding: "3px 0 3px 10px", borderLeft: `2px solid ${node.color}66`, marginBottom: "4px", lineHeight: 1.4 }}>{d}</div>
          ))}
        </div>
        <div>
          <div style={{ color: P.lblue, fontSize: "10px", fontWeight: "bold", letterSpacing: "1.5px", textTransform: "uppercase", fontFamily: "'Trebuchet MS', sans-serif", marginBottom: "6px" }}>← Reçoit de</div>
          {inFlows.length === 0
            ? <div style={{ color: P.muted, fontSize: "11px", fontStyle: "italic" }}>Source primaire</div>
            : inFlows.map((f, i) => (
              <div key={i} style={{ marginBottom: "5px" }}>
                <div style={{ color: P.white, fontSize: "11px", fontWeight: "bold", fontFamily: "'Trebuchet MS', sans-serif" }}>{allNodesMap[f.from]?.label}</div>
                <div style={{ color: P.muted, fontSize: "10px", fontStyle: "italic" }}>{f.label}</div>
              </div>
            ))}
        </div>
        <div>
          <div style={{ color: P.green, fontSize: "10px", fontWeight: "bold", letterSpacing: "1.5px", textTransform: "uppercase", fontFamily: "'Trebuchet MS', sans-serif", marginBottom: "6px" }}>→ Alimente</div>
          {outFlows.length === 0
            ? <div style={{ color: P.muted, fontSize: "11px", fontStyle: "italic" }}>Sortie finale</div>
            : outFlows.map((f, i) => (
              <div key={i} style={{ marginBottom: "5px" }}>
                <div style={{ color: P.white, fontSize: "11px", fontWeight: "bold", fontFamily: "'Trebuchet MS', sans-serif" }}>{allNodesMap[f.to]?.label}</div>
                <div style={{ color: P.muted, fontSize: "10px", fontStyle: "italic" }}>{f.label}</div>
              </div>
            ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [selected, setSelected] = useState(null);
  const handleClick = (id) => setSelected(prev => prev === id ? null : id);

  return (
    <div style={{ background: P.bg, minHeight: "100vh", padding: "24px 20px", fontFamily: "'Trebuchet MS', sans-serif" }}>

      {/* HEADER */}
      <div style={{ background: "linear-gradient(135deg, #1F4E79, #2E75B6)", borderRadius: "8px", padding: "18px 24px", marginBottom: "20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ color: "#BDD7EE", fontSize: "10px", letterSpacing: "3px", textTransform: "uppercase", marginBottom: "4px" }}>
            CRI Marrakech-Safi — Chef de Service Développement de l'Offre Territoriale
          </div>
          <div style={{ color: P.white, fontSize: "18px", fontWeight: "bold" }}>
            Architecture de Travail & Circulation des Données
          </div>
          <div style={{ color: "#BDD7EE", fontSize: "12px", marginTop: "3px", fontStyle: "italic" }}>
            Système intégré SIG · ODI · Packaging · POTI — cliquez sur un nœud pour voir les flux
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ color: "#BDD7EE", fontSize: "10px", letterSpacing: "2px" }}>Mars 2026</div>
        </div>
      </div>

      {/* LAYERS */}
      {LAYERS.map((layer, li) => (
        <div key={layer.id} style={{ marginBottom: "8px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "8px" }}>
            <div style={{ background: layer.color + "22", border: `1px solid ${layer.color}66`, borderRadius: "4px", padding: "4px 12px" }}>
              <span style={{ color: layer.color, fontSize: "10px", fontWeight: "bold", letterSpacing: "2px", textTransform: "uppercase" }}>{layer.label}</span>
              <span style={{ color: P.muted, fontSize: "10px", marginLeft: "8px", fontStyle: "italic" }}>— {layer.sublabel}</span>
            </div>
            <div style={{ flex: 1, height: "1px", background: `linear-gradient(to right, ${layer.color}44, transparent)` }} />
          </div>

          <div style={{ display: "flex", gap: "8px", background: layer.color + "08", border: `1px solid ${layer.color}22`, borderRadius: "8px", padding: "12px" }}>
            {layer.nodes.map(node => (
              <NodeCard key={node.id} node={node} selected={selected} onClick={handleClick} />
            ))}
          </div>

          {li < LAYERS.length - 1 && (
            <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: "8px", padding: "6px 0" }}>
              {[...Array(7)].map((_, i) => (
                <div key={i} style={{ width: "6px", height: "6px", borderRadius: "50%", background: i === 3 ? P.accent : P.border, opacity: 0.4 + i * 0.08 }} />
              ))}
              <div style={{ color: P.muted, fontSize: "10px", letterSpacing: "2px" }}>▼</div>
              {[...Array(7)].map((_, i) => (
                <div key={i} style={{ width: "6px", height: "6px", borderRadius: "50%", background: i === 3 ? P.accent : P.border, opacity: 0.4 + (6 - i) * 0.08 }} />
              ))}
            </div>
          )}
        </div>
      ))}

      {selected && <DetailPanel nodeId={selected} onClose={() => setSelected(null)} />}

      {/* LEGEND */}
      <div style={{ marginTop: "16px", background: P.panel, border: `1px solid ${P.border}`, borderRadius: "8px", padding: "12px 16px" }}>
        <div style={{ color: P.muted, fontSize: "10px", fontWeight: "bold", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "10px" }}>Légende des flux de données</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: "12px" }}>
          {[
            { color: P.blue,    label: "Flux CRI interne (SIG, CRUI, Conseillers)" },
            { color: "#5B8C5A", label: "Flux partenaires (Région, AMDIE, ZAE)" },
            { color: P.gold,    label: "Flux réglementaire (PA, Charte, Règlement)" },
            { color: P.red,     label: "Flux investisseurs (Retours, demandes)" },
            { color: P.green,   label: "Flux vers les utilisateurs (Sorties)" },
            { color: P.lgold,   label: "Flux POTI — horizon H3" },
          ].map((f, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <div style={{ width: "24px", height: "3px", background: f.color, borderRadius: "2px" }} />
              <span style={{ color: P.muted, fontSize: "10px" }}>{f.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* STATS */}
      <div style={{ marginTop: "10px", display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "8px" }}>
        {[
          { val: "13", label: "nœuds du système",    color: P.blue },
          { val: "18", label: "flux de données",      color: P.lblue },
          { val: "3",  label: "couches de traitement",color: P.green },
          { val: "H3", label: "horizon POTI",         color: P.gold },
        ].map((s, i) => (
          <div key={i} style={{ background: P.panel, border: `1px solid ${s.color}44`, borderRadius: "6px", padding: "10px 14px", textAlign: "center" }}>
            <div style={{ color: s.color, fontSize: "22px", fontWeight: "bold" }}>{s.val}</div>
            <div style={{ color: P.muted, fontSize: "10px", marginTop: "2px" }}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{ marginTop: "10px", padding: "8px 14px", background: P.panel, borderLeft: `3px solid ${P.blue}`, borderRadius: "0 4px 4px 0", fontSize: "10px", color: P.muted, fontStyle: "italic" }}>
        ODI = Observatoire de la Demande d'Investissement · POTI = Portail de l'Offre Territoriale Intelligente (H3) · SBO = Sidi Bou Othmane · PA = Plan d'Aménagement · CUS/COS = Coefficients d'Utilisation/d'Occupation du Sol
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
